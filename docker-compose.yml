services:
  postgres:
    image: postgres:16-alpine
    container_name: cinder-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cinder
      POSTGRES_PASSWORD: cinder
      POSTGRES_DB: cinder
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinder"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: cinder-srv/Dockerfile
    container_name: cinder-server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CINDER_DATABASE_URL: postgres://cinder:cinder@postgres:5432/cinder
      CINDER_JWT_SECRET: change-me-in-production
      CINDER_HOST: 0.0.0.0
      CINDER_PORT: 3000
      RUST_LOG: info
    volumes:
      - ./.env:/app/.env:ro
      - ./neuron.toml:/app/neuron.toml:ro
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: cinder-web-ui/Dockerfile
    container_name: cinder-web
    depends_on:
      server:
        condition: service_started
    environment:
      VITE_API_PROXY_TARGET: http://server:3000
    ports:
      - "5173:5173"

volumes:
  pgdata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinder-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cinder
      POSTGRES_PASSWORD: cinder
      POSTGRES_DB: cinder
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinder"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

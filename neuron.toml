[llm]
provider = "openai"

[llm.openai]
model = "gpt-4.1"

[llm.openrouter]
model = "google/gemma-3-12b-it"
# base_url defaults to https://openrouter.ai/api; override here if needed

[llm.retry]
max_retries = 2
base_delay_ms = 250
max_delay_ms = 2000

[imports]
agent_profiles = ["config/agent_profiles/profiles.toml"]
